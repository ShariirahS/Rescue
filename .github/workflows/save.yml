name: Save Webpage

on:
  push:
    paths:
      - url.txt

permissions:
  contents: write

jobs:
  save:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install SingleFile
        run: npm i -g single-file-cli

      - name: Save page
        run: |
          URL=$(cat url.txt)
          single-file "$URL" output.html

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output.html
          git commit -m "Update offline page" || echo "No changes"
          git push
